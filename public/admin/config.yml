# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: FarrelPahlevi/activity-log
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/8a89951f-9d3e-4cb0-a707-4f44ab1771e4/pkce
  auth_token_endpoint: /sites/8a89951f-9d3e-4cb0-a707-4f44ab1771e4/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://farrelactivitylog.netlify.app

# Media
media_folder: "public/uploads"
public_folder: "/uploads"

# Collections
collections:
  - name: "activities"
    label: "Kegiatan"
    label_singular: "Kegiatan"
    folder: "src/data/activities"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    sort: "date:desc"
    summary: "{{title}} — {{date}}"
    fields:
      - label: "Judul"
        name: "title"
        widget: "string"
        hint: "Judul kegiatan yang deskriptif"

      - label: "Tanggal"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD MMMM YYYY"
        time_format: false
        hint: "Tanggal kegiatan dikerjakan"

      - label: "Kategori"
        name: "category"
        widget: "select"
        options:
          - "Elektronik & Reparasi"
          - "Jaringan"
          - "Software & Programming"
          - "DIY & Rumah"
          - "Lainnya"

      - label: "Cover Image"
        name: "coverImage"
        widget: "image"
        choose_url: false
        hint: "Foto utama untuk kegiatan ini (rasio 16:10 recommended)"

      - label: "Ringkasan"
        name: "summary"
        widget: "text"
        hint: "1-2 kalimat singkat tentang kegiatan ini (muncul di preview list)"

      - label: "Tags"
        name: "tags"
        widget: "list"
        allow_add: true
        hint: "Tag terkait, misal: Arduino, Networking, Docker"

      - label: "Konten"
        name: "body"
        widget: "markdown"
        hint: "Dokumentasi lengkap kegiatan. Bisa embed gambar, code block, tabel, dll."
